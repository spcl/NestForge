[build-system]
requires = ["setuptools>=61"]
build-backend = "setuptools.build_meta"

[project]
name = "nest-forge"
version = "0.0.1"
description = "Extract DaCe loop-/map-nests and offload them to external compilers via an arena."
requires-python = ">=3.10"
# optarena is vendored as the ./external/optarena git submodule (it is not on PyPI). Resolve it with
#   git submodule update --init --recursive && pip install -e external/optarena
# nest-forge surfaces two of its pieces natively: nestforge.translator and nestforge.corpus.
dependencies = ["dace", "numpy", "pyyaml", "optarena"]

[tool.setuptools.packages.find]
include = ["nestforge*"]

[tool.yapf]
column_limit = 120
