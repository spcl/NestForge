name: experiments

# Run the paper's E1-E5 pipeline (scripts/run_experiments.py) and upload the JSON tables as an artifact.
# This is the RESULT-PRODUCING workflow, distinct from ci.yml, which only TESTS the driver code. Kept
# separate and dispatch-only because a corpus run compiles thousands of kernels -- burdening every push
# with it, and with an artifact upload, is exactly what ci.yml is designed to stay fast by avoiding.
#
# Bounded by default so a manual dispatch finishes in minutes; set kernels=0 for the full corpus (hours --
# that is really the cluster's job, this is the reproducible smoke that proves the pipeline end to end).
on:
  workflow_dispatch:
    inputs:
      experiments:
        description: comma-separated subset of e1,e2,e3,e4,e5
        default: e1,e2,e3,e4,e5
      kernels:
        description: how many corpus kernels (0 = all)
        default: '12'
      granularity_points:
        description: granularity rungs per kernel
        default: '4'
      reps:
        description: timed repetitions per measurement
        default: '7'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  run:
    name: run E1-E5 + upload tables
    runs-on: ubuntu-latest
    timeout-minutes: 300  # a bounded dispatch is minutes; kernels=0 is a deliberate hours-long opt-in
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # Setup mirrors ci.yml Phases 1-2 (a separate workflow is independent, so it re-declares them). The
      # toolchain, then DaCe (extended) + OptArena + nest-forge, editable from GitHub over HTTPS -- both
      # public, so no key and no token.
      - name: system toolchain (scripts/setup_apt.sh)
        run: sudo bash scripts/setup_apt.sh

      - name: ccache (restore + enable)
        uses: actions/cache@v4
        with:
          path: ~/.cache/ccache
          key: ccache-experiments-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            ccache-experiments-${{ runner.os }}-
      - name: put ccache on PATH
        run: |
          ccache --max-size=2G
          ccache --zero-stats
          echo "/usr/lib/ccache" >> "$GITHUB_PATH"

      - name: DaCe (extended) + OptArena + nest-forge[dev], editable
        run: |
          pip_retry() { for i in 1 2 3 4 5; do python -m pip install "$@" && return 0; echo "pip attempt $i failed; retry in $((i*5))s"; sleep $((i*5)); done; return 1; }
          pip_retry --src "$RUNNER_TEMP/src" -e "git+https://github.com/spcl/dace.git@extended#egg=dace"
          pip_retry --src "$RUNNER_TEMP/src" -e "git+https://github.com/spcl/OptArena.git#egg=optarena"
          pip_retry -e ".[dev]"
          python -c "import dace, optarena; print('dace', dace.__file__); print('optarena', optarena.__file__)"

      # The run itself. --out is OUTSIDE the workspace ($RUNNER_TEMP) so the per-cell build trees the drivers
      # emit never land in the checkout; only the JSON tables are copied back for upload.
      - name: run E1-E5
        run: |
          python scripts/run_experiments.py \
            --out "$RUNNER_TEMP/results" \
            --experiments "${{ inputs.experiments }}" \
            --kernels "${{ inputs.kernels }}" \
            --granularity-points "${{ inputs.granularity_points }}" \
            --reps "${{ inputs.reps }}"
          mkdir -p tables
          cp "$RUNNER_TEMP/results"/*.json tables/
          echo "== tables produced ==" && ls -l tables/

      - name: upload tables
        uses: actions/upload-artifact@v4
        with:
          name: e1-e5-tables
          path: tables/*.json
          if-no-files-found: error  # the run produced no table -> the pipeline is broken, fail loudly
