name: CI

# One CPU runner: a format gate, then the toolchain via the repo's
# own scripts/setup_apt.sh (so CI dogfoods it), then DaCe (branch extended) + OptArena installed editable,
# then pytest. nvc++/icpx/oneAPI are absent on the runner, so the vendor-compiler + heavy-launcher tests
# are @pytest.mark.integration and excluded; g++/clang++ + libomp cover the cross-compiler OpenMP matrix.
#
# spcl/OptArena and spcl/dace are both PUBLIC, so their sibling checkouts need no key and no token.
# This workflow must stay credential-free: the moment a checkout here needs a secret, CI stops running on
# fork PRs (secrets are not exposed to them), which is how it ended up dispatch-only before.
#
# The pytest phase runs the UNIT set (-m "not integration") and enforces ZERO skips via
# NESTFORGE_CI_NO_SKIP (repo-root conftest.py fails the session if any remaining test skips).
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: format + toolchain + pytest
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # Phase 0 -- format gate BEFORE the heavy setup, so a style slip fails in seconds. yapf +
      # clang-format ship as pip wheels (the clang-format wheel bundles the binary).
      - name: Phase 0 -- format (yapf 120 + clang-format 160)
        run: |
          python -m pip install --upgrade pip
          python -m pip install yapf clang-format
          bash scripts/format.sh --check

      # The two repos nest-forge imports: OptArena (corpus + numpyto) and DaCe (branch extended). Both
      # public -> plain checkouts, no key and no token.
      #
      # They go under .deps/ and NOT ./dace + ./optarena: pytest puts the repo root on sys.path, so a
      # checkout named ./dace shadows the `dace` PACKAGE and every test dies with "cannot import name
      # 'SDFG' from partially initialized module 'dace.sdfg' (most likely due to a circular import)".
      # The editable installs below are what make the imports resolve, so the checkout path is free to
      # be anything that does not collide with an importable name. Locally the two are true siblings of
      # nest-forge, which is why this never bit outside CI.
      - name: Phase 1a -- OptArena checkout (.deps/optarena)
        uses: actions/checkout@v4
        with:
          repository: spcl/OptArena
          path: .deps/optarena

      - uses: actions/checkout@v4
        with:
          repository: spcl/dace
          ref: extended
          path: .deps/dace
          submodules: recursive

      # Toolchain via the repo's own apt script (idempotent; missing-on-runner packages warn + skip).
      - name: Phase 1b -- system toolchain (scripts/setup_apt.sh)
        run: sudo bash scripts/setup_apt.sh

      - name: Phase 2 -- DaCe (extended) + OptArena + test deps, editable
        run: |
          pip_retry() { for i in 1 2 3 4 5; do python -m pip install "$@" && return 0; echo "pip attempt $i failed; retry in $((i*5))s"; sleep $((i*5)); done; return 1; }
          pip_retry -e ./.deps/dace
          pip_retry -e ./.deps/optarena
          # Two deps that only a CLEAN environment exposes -- both are present on the dev box, so nothing
          # local ever needed them declared:
          #   sqlmodel   -- imported by optarena (frameworks/schema.py, frameworks/test.py). optarena's
          #                 setup.py used to declare NO dependencies at all, so `pip install -e` above
          #                 resolved none of them and ~38 tests died with ModuleNotFoundError. Fixed
          #                 upstream in OptArena 610c1c7e (install_requires), which `-e ./.deps/optarena`
          #                 now pulls. Kept explicit so a regression in that declaration turns into a
          #                 packaging bug for optarena to fix, not ~38 red tests here.
          #   matplotlib -- nest-forge's OWN perf/plot_*.py import it, and the plot smokes run them as a
          #                 SUBPROCESS, so a missing import surfaces only as "exit status 1" from 4 tests.
          pip_retry numpy pytest pytest-timeout pytest-xdist sympy sqlmodel matplotlib
          # the checkouts must not shadow the packages they provide (see Phase 1a)
          python -c "import dace, optarena; print('dace', dace.__file__); print('optarena', optarena.__file__)"

      # Unit set only (-m "not integration"): vendor-compiler + heavy-launcher tests are marked
      # @pytest.mark.integration and excluded here. NESTFORGE_CI_NO_SKIP=1 makes conftest.py fail the
      # session if any of the remaining tests skip -- the unit set must run with zero skips. This already
      # covers the optimizer contract (each variant is an optimizer) and the no-op agent's proposal, which
      # are pure-config unit tests (no compile).
      - name: Phase 3 -- pytest (unit set, 0-skip enforced)
        env:
          NESTFORGE_CI_NO_SKIP: '1'
        run: |
          python -m pytest -q -p no:cacheprovider -m "not integration" -n auto --timeout=900

      # The optimizer loop END TO END: the no-op agent's proposal and the STUB AGENT's whole
      # propose -> build -> validate bit-exact -> time -> observe -> stop loop, against the real build path.
      # Those smokes are @pytest.mark.integration (they compile a nest), so the unit phase skips them -- run
      # them here on their own, where g++ is present on the runner. Phase 3 already covers the loop against
      # a FAKE measure (no compiler); this is the half that proves an agent's proposal survives a real one.
      # Neither runs inference -- there is none to run. The whole-program tests join it for the same reason: their
      # run-and-compare (externalize + isolate, and the whole-program lane) is the ONLY proof that the
      # offload analysis is value-preserving, and it is integration-marked, so Phase 3 never runs it.
      # Everything named here needs only g++, which the runner has.
      - name: Phase 4 -- optimizer loop + whole-program end-to-end (builds + validates)
        run: |
          python -m pytest -q -p no:cacheprovider tests/test_optimizers.py tests/test_predictive.py \
            tests/test_offload_scopes.py tests/test_whole_program_lane.py --timeout=900
