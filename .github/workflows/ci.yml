name: CI

# One CPU runner: format gate -> toolchain via scripts/setup_apt.sh -> DaCe(extended)+hpcagent_bench editable
# from GitHub -> pytest. nvc++/icpx are absent here, so vendor-compiler + heavy-launcher tests are
# @pytest.mark.integration and excluded; g++/clang++ + libomp cover the OpenMP matrix.
# Must stay credential-free: a dep needing a secret stops CI running on fork PRs.
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: format + toolchain + pytest
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # Format gate runs first so a style slip fails in seconds. yapf is PINNED to pyproject's [dev]
      # version -- its wrapping heuristics change between releases, so an unpinned gate rejects a tree
      # formatted with the pinned one (test_driver_contracts.py keeps the two in sync).
      - name: Phase 0 -- format (yapf 120 + clang-format 160)
        run: |
          python -m pip install --upgrade pip
          python -m pip install yapf==0.43.0 clang-format
          bash scripts/format.sh --check

      # Toolchain via the repo's own apt script (idempotent; missing-on-runner packages warn + skip).
      - name: Phase 1 -- system toolchain (scripts/setup_apt.sh)
        run: sudo bash scripts/setup_apt.sh

      # ccache keys on PREPROCESSED SOURCE, so identical generated C hits even from a fresh temp dir;
      # persisting across runs is what makes it pay. Safe because this job never asserts on compile TIME.
      - name: Phase 1b -- ccache (restore + enable)
        uses: actions/cache@v4
        with:
          path: ~/.cache/ccache
          key: ccache-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            ccache-${{ runner.os }}-
      - name: Phase 1c -- put ccache on PATH
        run: |
          ccache --max-size=1G
          ccache --zero-stats
          echo "/usr/lib/ccache" >> "$GITHUB_PATH"

      - name: Phase 2 -- DaCe (extended) + hpcagent_bench + nest-forge[dev], editable
        run: |
          pip_retry() { for i in 1 2 3 4 5; do python -m pip install "$@" && return 0; echo "pip attempt $i failed; retry in $((i*5))s"; sleep $((i*5)); done; return 1; }
          # Editable from GitHub over HTTPS: both repos are public, so no key/token, which keeps this
          # workflow running on fork PRs. @extended pins the DaCe branch nest-forge needs.
          # A git requirement makes pip run `git submodule update --init --recursive`, which DaCe needs:
          # it vendors runtime headers as submodules (external/moodycamel/blockingconcurrentqueue.h).
          # --src keeps clones OUT of the workspace -- pytest puts the repo root on sys.path, so a ./dace
          # directory would shadow the `dace` package.
          pip_retry --src "$RUNNER_TEMP/src" -e "git+https://github.com/spcl/dace.git@extended#egg=dace"
          # The PACKAGE is now `hpcagent_bench` (renamed from `optarena`); the GitHub REPO is still
          # spcl/OptArena, so the URL keeps the old name until the repo itself is renamed.
          pip_retry --src "$RUNNER_TEMP/src" -e "git+https://github.com/spcl/OptArena.git#egg=hpcagent_bench"
          # dace-fortran is cloned BY HAND and installed from the path, for two reasons a git+URL
          # cannot avoid:
          #  1. pip runs `git submodule update --init --recursive` on a git requirement, and
          #     dace-fortran's submodules are ICON fixtures on gitlab.dkrz.de, which a GitHub runner
          #     cannot reach ("Failed to connect to gitlab.dkrz.de port 443"). A plain clone does not
          #     init submodules, and CI does not need the ICON corpus to import the package.
          #  2. its pyproject pins `dace @ ...@FaCe`, and pip does NOT leave an already-resolved
          #     editable extended alone -- it uninstalls it and puts the FaCe pin over the top
          #     ("Attempting uninstall: dace" in the log). FaCe is a SUBSET of extended, so nest-forge
          #     then imports a dace missing the extended-only passes it calls and every test module
          #     fails to collect. --no-deps keeps extended, which serves dace-fortran fine.
          # --no-deps means its PyPI deps are installed here explicitly; the import check below is what
          # catches this list going stale.
          git clone --filter=blob:none --depth 1 https://github.com/spcl/dace-fortran.git "$RUNNER_TEMP/src/dace-fortran"
          pip_retry --no-deps -e "$RUNNER_TEMP/src/dace-fortran"
          pip_retry "fparser>0.2" networkx numpy
          # nest-forge + [dev]. matplotlib is required: the plot smokes run perf/plot_*.py as a
          # SUBPROCESS, where a missing import surfaces only as "exit status 1".
          pip_retry -e ".[dev]"
          # Prove what actually landed. Without this a bad install surfaces as ~60 collection errors in
          # Phase 3 naming a missing dace module, which reads like a nest-forge bug and is not one.
          python -c "import dace, hpcagent_bench; print('dace', dace.__file__); print('bench', hpcagent_bench.__file__)"
          python -c "import dace.transformation.interstate.fuse_loops" \
            || { echo "::error::the installed dace is not @extended (a pin was resolved over the top)"; exit 1; }
          python -c "import dace_fortran.build" \
            || { echo "::error::dace-fortran cannot import -- the --no-deps list above is missing something"; exit 1; }

      # Unit set only. NESTFORGE_CI_NO_SKIP=1 makes conftest.py fail the session if any remaining test
      # skips -- the unit set must run with zero skips.
      - name: Phase 3 -- pytest (unit set, 0-skip enforced)
        env:
          NESTFORGE_CI_NO_SKIP: '1'
        run: |
          python -m pytest -q -p no:cacheprovider -m "not integration" -n auto --timeout=900

      # The whole integration set, selected by MARKER rather than by a hand-listed set of files -- a list
      # goes stale silently (a new integration test simply never runs), which is the one failure mode CI
      # cannot detect for itself. Phase 3 covers the same paths against a FAKE measure; this phase is the
      # only proof the real build paths are value-preserving: the optimizer loop (propose -> build ->
      # validate bit-exact -> time -> observe -> stop), the whole-program offload analysis, the static-lib
      # link into the parent .so, and the extern-swap behind differential + E1..E5.
      # Nearly all of it needs only g++/clang++ + ar, which the runner has. The few cases that need a
      # vendor compiler or mpirun probe PATH and skip themselves with a reason -- so this phase does NOT
      # set NESTFORGE_CI_NO_SKIP (Phase 3 keeps the zero-skip rule for the unit set).
      - name: Phase 4 -- integration set (builds, runs, validates bit-exact)
        run: |
          python -m pytest -q -p no:cacheprovider -m integration --timeout=900
