name: CI

# One CPU runner (the nest-forge unit suite is ~30s): a format gate, then the toolchain via the repo's
# own scripts/setup_apt.sh (so CI dogfoods it), then DaCe (branch extended) + OptArena installed editable,
# then pytest. nvc++/icpx/oneAPI are absent on the runner, so the vendor-compiler + heavy-launcher tests
# are @pytest.mark.integration and excluded; g++/clang++ + libomp cover the cross-compiler OpenMP matrix.
#
# spcl/OptArena and spcl/dace are both PUBLIC, so their sibling checkouts need no key and no token.
# This workflow must stay credential-free: the moment a checkout here needs a secret, CI stops running on
# fork PRs (secrets are not exposed to them), which is how it ended up dispatch-only before.
#
# The pytest phase runs the UNIT set (-m "not integration") and enforces ZERO skips via
# NESTFORGE_CI_NO_SKIP (repo-root conftest.py fails the session if any remaining test skips).
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: format + toolchain + pytest
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # Phase 0 -- format gate BEFORE the heavy setup, so a style slip fails in seconds. yapf +
      # clang-format ship as pip wheels (the clang-format wheel bundles the binary).
      - name: Phase 0 -- format (yapf 120 + clang-format 160)
        run: |
          python -m pip install --upgrade pip
          python -m pip install yapf clang-format
          bash scripts/format.sh --check

      # The two sibling repos nest-forge imports live: OptArena (corpus + numpyto) and DaCe (branch
      # extended). Both public -> plain checkouts, no key and no token.
      - name: Phase 1a -- OptArena checkout (sibling ./optarena)
        uses: actions/checkout@v4
        with:
          repository: spcl/OptArena
          path: optarena

      - uses: actions/checkout@v4
        with:
          repository: spcl/dace
          ref: extended
          path: dace
          submodules: recursive

      # Toolchain via the repo's own apt script (idempotent; missing-on-runner packages warn + skip).
      - name: Phase 1b -- system toolchain (scripts/setup_apt.sh)
        run: sudo bash scripts/setup_apt.sh

      - name: Phase 2 -- DaCe (extended) + OptArena (sibling) + test deps, editable
        run: |
          pip_retry() { for i in 1 2 3 4 5; do python -m pip install "$@" && return 0; echo "pip attempt $i failed; retry in $((i*5))s"; sleep $((i*5)); done; return 1; }
          pip_retry -e ./dace
          pip_retry -e ./optarena
          pip_retry numpy pytest pytest-timeout pytest-xdist sympy

      # Unit set only (-m "not integration"): vendor-compiler + heavy-launcher tests are marked
      # @pytest.mark.integration and excluded here. NESTFORGE_CI_NO_SKIP=1 makes conftest.py fail the
      # session if any of the remaining tests skip -- the unit set must run with zero skips. This already
      # covers the optimizer contract (each variant is an optimizer) and the no-op agent's proposal, which
      # are pure-config unit tests (no compile).
      - name: Phase 3 -- pytest (unit set, 0-skip enforced)
        env:
          NESTFORGE_CI_NO_SKIP: '1'
        run: |
          python -m pytest -q -p no:cacheprovider -m "not integration" -n auto --timeout=900

      # The optimizer loop END TO END: the no-op agent proposes the Phase-1 baseline, and the arena builds
      # it and validates bit-exact vs the numpy oracle. That smoke is @pytest.mark.integration (it compiles
      # a nest), so the unit phase skips it -- run it here on its own, where g++ is present on the runner.
      # This is the CI guarantee that the deterministic-optimizer / no-op-agent loop actually runs, not just
      # that its recipes are well-formed. The whole-program tests join it for the same reason: their
      # run-and-compare (externalize + isolate, and the whole-program lane) is the ONLY proof that the
      # offload analysis is value-preserving, and it is integration-marked, so Phase 3 never runs it.
      # Everything named here needs only g++, which the runner has.
      - name: Phase 4 -- optimizer loop + whole-program end-to-end (builds + validates)
        run: |
          python -m pytest -q -p no:cacheprovider tests/test_optimizers.py tests/test_predictive.py \
            tests/test_offload_scopes.py tests/test_whole_program_lane.py --timeout=900
